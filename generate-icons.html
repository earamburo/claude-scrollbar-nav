<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Icons</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #222; color: white; }
    canvas { border: 1px solid #444; margin: 8px; image-rendering: pixelated; }
    a { display: inline-block; padding: 8px 16px; background: #CC5D2C; color: white; border-radius: 6px; text-decoration: none; font-size: 13px; }
    .row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    label { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <h2 style="margin-bottom:24px;">Claude Nav — Icon Generator</h2>
  <p style="color:#aaa; font-size:13px; margin-bottom:32px;">Double-click this file in File Explorer to open it in Chrome, then click each Download button.</p>
  <div id="output"></div>
  <script>
    const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <rect width="128" height="128" rx="22" fill="#111111"/>
      <rect x="22" y="26" width="76" height="18" rx="5" fill="#CC5D2C"/>
      <rect x="22" y="26" width="5"  height="18" rx="2.5" fill="#FF8C42"/>
      <rect x="22" y="55" width="76" height="18" rx="5" fill="#CC5D2C"/>
      <rect x="22" y="55" width="5"  height="18" rx="2.5" fill="#FF8C42"/>
      <rect x="22" y="84" width="76" height="18" rx="5" fill="#CC5D2C"/>
      <rect x="22" y="84" width="5"  height="18" rx="2.5" fill="#FF8C42"/>
    </svg>`;

    const blob = new Blob([SVG], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);

    const img = new Image();
    img.src = url;
    img.onload = () => {
      [16, 48, 128].forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        canvas.getContext('2d').drawImage(img, 0, 0, size, size);

        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `icon${size}.png`;
        link.textContent = `Download icon${size}.png`;

        const row = document.createElement('div');
        row.className = 'row';
        row.appendChild(canvas);
        row.appendChild(link);
        row.appendChild(Object.assign(document.createElement('label'), { textContent: `${size}×${size}` }));
        document.getElementById('output').appendChild(row);
      });

      URL.revokeObjectURL(url);
    };
  </script>
</body>
</html>
